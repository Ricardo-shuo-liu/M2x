<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 代码块专属样式：关键！ -->
    <style>
        /* 全局基础样式（可选，优化整体阅读） */
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.8;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        p, li {
            font-size: 16px;
        }

        /* 代码块核心样式：重点！ */
        pre {
            background-color: #f8f9fa; /* 浅灰色背景，区分普通文本 */
            border: 1px solid #e9ecef; /* 浅灰色边框 */
            border-radius: 8px; /* 圆角，更美观 */
            padding: 20px; /* 内边距，代码不贴边 */
            margin: 15px 0; /* 上下间距，和普通文本分开 */
            overflow-x: auto; /* 代码过长时横向滚动，不换行 */
            font-family: Consolas, "Liberation Mono", Menlo, Monaco, monospace; /* 等宽字体，代码对齐 */
            font-size: 14px; /* 代码字体大小 */
            line-height: 1.5; /* 代码行高，避免拥挤 */
        }
        code {
            color: #e83e8c; /* 代码文字颜色（紫红色），和普通文本区分 */
            background-color: #f8f9fa; /* 行内代码也带浅背景 */
            padding: 2px 4px; /* 行内代码内边距 */
            border-radius: 4px; /* 行内代码圆角 */
        }
        /* 单独给<pre>里的<code>取消行内样式（避免重复） */
        pre code {
            color: #2d3748; /* 代码块内文字用深灰色，更易读 */
            background-color: transparent; /* 继承pre的背景，不重复 */
            padding: 0; /* 取消行内padding */
        }
    </style>
</head>
<body>
<!-- 以下粘贴你的原有HTML内容 -->
<!-- ...... 其余内容 ...... -->
</body>
</html>
